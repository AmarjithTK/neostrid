name: Release Linux

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts
        run: npm run clean:out && npm run build && npx electron-builder --publish never

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.AppImage
            out/*.deb
            out/latest-linux.yml
          fail_on_unmatched_files: false
          append_body: true
          body: |
            Linux artifacts:
            - AppImage
            - deb
