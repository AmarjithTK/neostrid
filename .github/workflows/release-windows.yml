name: Release Windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run clean:out && npm run build && npx electron-builder --publish never

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.exe
            out/*.blockmap
            out/latest*.yml
          fail_on_unmatched_files: false
          append_body: true
          body: |
            Windows artifacts:
            - NSIS installer (.exe)
